<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXIQ — لوحة الأونر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--surface:#0e0e1c;--card:#13132a;--border:#1e1e3a;--purple:#7c3aed;--pl:#a855f7;--accent:#06b6d4;--green:#10b981;--text:#f1f0ff;--muted:#6b6b8a;--danger:#ef4444;--gold:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}

#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:3rem;width:100%;max-width:420px;text-align:center;position:relative;z-index:1;}
.login-logo{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.4em;color:var(--pl);margin-bottom:1.5rem;opacity:.8;}
.login-icon{font-size:3rem;margin-bottom:1rem;}
.login-title{font-size:1.8rem;font-weight:900;margin-bottom:.4rem;}
.login-sub{font-size:.9rem;color:var(--muted);margin-bottom:2rem;}
.f-group{margin-bottom:1rem;text-align:right;}
.f-label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:.4rem;letter-spacing:.05em;}
.f-input{width:100%;padding:.9rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;}
.f-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.f-input[type=password]{font-family:'Space Mono',monospace;letter-spacing:.15em;}
.login-btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--purple),var(--pl));border:none;border-radius:12px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .3s;margin-top:.5rem;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(124,58,237,.4);}
.login-err{color:var(--danger);font-size:.85rem;margin-top:.75rem;padding:.6rem 1rem;background:rgba(239,68,68,.08);border-radius:8px;border:1px solid rgba(239,68,68,.2);display:none;}

#adminPanel{display:none;padding:1.5rem 2rem;max-width:1300px;margin:0 auto;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.admin-brand{display:flex;flex-direction:column;}
.admin-logo{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.3em;color:var(--pl);margin-bottom:.25rem;}
.admin-title{font-size:1.4rem;font-weight:800;}
.admin-user{font-size:.8rem;color:var(--muted);margin-top:.25rem;}
.hdr-btns{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.3rem;text-align:center;transition:border-color .2s;}
.scard:hover{border-color:rgba(124,58,237,.4);}
.scard-num{font-family:'Space Mono',monospace;font-size:1.9rem;font-weight:700;display:block;margin-bottom:.2rem;}
.scard-lbl{font-size:.75rem;color:var(--muted);letter-spacing:.05em;}

.toolbar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.s-input{flex:1;min-width:200px;padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.s-input:focus{border-color:var(--purple);}
.f-sel{padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}

.tw{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:2rem;}
.tw-hdr{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tw-title{font-size:.95rem;font-weight:700;}
.tw-count{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted);}
.t-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:800px;}
th{padding:.8rem 1rem;text-align:right;font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-family:'Space Mono',monospace;border-bottom:1px solid var(--border);background:rgba(14,14,28,.8);white-space:nowrap;}
td{padding:.85rem 1rem;font-size:.88rem;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(124,58,237,.03);}
.elo-b{font-family:'Space Mono',monospace;font-size:.82rem;font-weight:700;padding:.25rem .65rem;border-radius:100px;background:rgba(124,58,237,.15);color:var(--pl);}
.type-b{font-size:.72rem;padding:.2rem .55rem;border-radius:6px;background:rgba(6,182,212,.1);color:var(--accent);}
.banned-row td{opacity:.45;}
.banned-tag{font-size:.68rem;color:var(--danger);font-family:'Space Mono',monospace;}
.dc{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);}

.ab{display:flex;gap:.4rem;align-items:center;flex-wrap:nowrap;}
.bv{padding:.35rem .8rem;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);border-radius:7px;color:var(--pl);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.bv:hover{background:rgba(124,58,237,.28);}
.bc{padding:.35rem .8rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:7px;color:var(--green);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.bc:hover{background:rgba(16,185,129,.22);}
.bb{padding:.35rem .8rem;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:7px;color:var(--danger);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;}
.bb:hover{background:rgba(239,68,68,.22);}
.bu{padding:.35rem .8rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:7px;color:var(--gold);font-family:'Tajawal',sans-serif;font-size:.78rem;cursor:pointer;white-space:nowrap;}

.empty-st{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:1rem;display:block;}

/* BUTTONS */
.btn-sm{padding:.55rem 1.1rem;border-radius:9px;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;border:1px solid;}
.btn-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green);}
.btn-green:hover{background:rgba(16,185,129,.25);}
.btn-red{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--danger);}
.btn-red:hover{background:rgba(239,68,68,.25);}
.btn-muted{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-muted:hover{border-color:var(--danger);color:var(--danger);}
.btn-logout{background:transparent;border-color:var(--border);color:var(--muted);padding:.55rem 1.1rem;border-radius:9px;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.mo.open{opacity:1;pointer-events:all;}
.mc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;width:90%;max-width:620px;max-height:90vh;overflow-y:auto;position:relative;}
.mc-close{position:absolute;top:.9rem;left:.9rem;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;}
.mc-close:hover{color:var(--text);}
.mc-title{font-size:1.2rem;font-weight:800;margin-bottom:1.5rem;padding-left:2rem;}
.dr{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid rgba(30,30,58,.8);}
.dr:last-child{border-bottom:none;}
.dk{font-size:.82rem;color:var(--muted);}
.dv{font-size:.9rem;font-weight:600;}
.dv.elo-v{font-family:'Space Mono',monospace;color:var(--pl);font-size:1.1rem;}

/* CERT */
.cert-wrap{background:linear-gradient(145deg,#08081a,#0d0d20);border:2px solid var(--purple);border-radius:18px;padding:2.5rem;text-align:center;margin-top:1.5rem;position:relative;overflow:hidden;}
.cert-wrap::before{content:'';position:absolute;top:-40%;left:-20%;width:140%;height:140%;background:radial-gradient(ellipse at 50% 30%,rgba(124,58,237,.12) 0%,transparent 60%);pointer-events:none;}
.cert-corner{position:absolute;font-size:1.5rem;opacity:.15;}
.cert-corner.tl{top:1rem;right:1rem;}
.cert-corner.tr{top:1rem;left:1rem;}
.cert-corner.bl{bottom:1rem;right:1rem;}
.cert-corner.br{bottom:1rem;left:1rem;}
.cert-badge-txt{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.35em;color:var(--pl);text-transform:uppercase;margin-bottom:1rem;opacity:.8;}
.cert-main-title{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#fff,var(--pl),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;}
.cert-subtitle{font-size:.85rem;color:var(--muted);margin-bottom:1rem;}
.cert-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);margin:.8rem auto;}
.cert-name{font-size:2.2rem;font-weight:900;color:var(--text);margin:.5rem 0 1.2rem;}
.cert-elo-wrap{display:inline-block;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:.8rem 2rem;margin-bottom:.5rem;}
.cert-elo-num{font-family:'Space Mono',monospace;font-size:2.8rem;font-weight:700;color:var(--pl);display:block;line-height:1;}
.cert-elo-lbl{font-size:.8rem;color:var(--muted);margin-top:.2rem;}
.cert-tier{font-size:1.1rem;color:var(--pg);font-weight:700;margin:.5rem 0 1.2rem;}
.cert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.2rem 0;}
.cg-item{background:rgba(255,255,255,.03);border-radius:10px;padding:.7rem .5rem;}
.cg-val{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:var(--text);display:block;}
.cg-lbl{font-size:.65rem;color:var(--muted);margin-top:.15rem;}
.cert-footer-txt{font-size:.72rem;color:var(--muted);margin-top:1rem;font-family:'Space Mono',monospace;line-height:1.8;}
.cert-id{font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(168,85,247,.3);margin-top:.4rem;}
.print-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--purple),var(--pl));border:none;border-radius:12px;color:#fff;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:1.2rem;transition:all .2s;}
.print-btn:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(124,58,237,.4);}

/* BAN MODAL */
.ban-mc{max-width:400px;text-align:center;}
.ban-icon{font-size:2.5rem;margin-bottom:1rem;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.cert-grid{grid-template-columns:repeat(2,1fr);}.hdr-btns{width:100%;}}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">NEXIQ · OWNER PANEL</div>
    <div class="login-icon">🔐</div>
    <h1 class="login-title">لوحة الأونر</h1>
    <p class="login-sub">أدخل بيانات الدخول السرية</p>
    <div class="f-group">
      <label class="f-label">الإيميل</label>
      <input class="f-input" type="email" id="emailInput" placeholder="owner@example.com" onkeydown="if(event.key==='Enter')document.getElementById('pwInput').focus()"/>
    </div>
    <div class="f-group">
      <label class="f-label">كلمة السر</label>
      <input class="f-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="login-btn" onclick="doLogin()">دخول ←</button>
    <div class="login-err" id="loginErr">البيانات غير صحيحة. تأكد من الإيميل وكلمة السر.</div>
  </div>
</div>

<!-- ══ ADMIN PANEL ══ -->
<div id="adminPanel">
  <div class="admin-header">
    <div class="admin-brand">
      <div class="admin-logo">NEXIQ · OWNER PANEL</div>
      <div class="admin-title">لوحة إدارة الاختبارات</div>
      <div class="admin-user" id="adminUserLbl"></div>
    </div>
    <div class="hdr-btns">
      <button class="btn-sm btn-green" onclick="addDemoData()">+ بيانات تجريبية</button>
      <button class="btn-sm btn-red" onclick="clearAllData()">🗑 مسح الكل</button>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="toolbar">
    <input class="s-input" type="text" id="searchInput" placeholder="🔍 ابحث بالاسم أو ELO أو المستوى..." oninput="renderTable()"/>
    <select class="f-sel" id="ftType" onchange="renderTable()">
      <option value="">الكل</option>
      <option value="ضيف">ضيف</option>
      <option value="مسجل">مسجل</option>
    </select>
    <select class="f-sel" id="ftStatus" onchange="renderTable()">
      <option value="">كل الحالات</option>
      <option value="active">نشط</option>
      <option value="banned">محظور</option>
    </select>
    <select class="f-sel" id="ftSort" onchange="renderTable()">
      <option value="date_desc">الأحدث أولاً</option>
      <option value="date_asc">الأقدم أولاً</option>
      <option value="elo_desc">أعلى ELO</option>
      <option value="elo_asc">أقل ELO</option>
    </select>
  </div>

  <div class="tw">
    <div class="tw-hdr">
      <div class="tw-title">المشتركون في الاختبار</div>
      <div class="tw-count" id="twCount">0 مشترك</div>
    </div>
    <div class="t-scroll" id="tBody"></div>
  </div>
</div>

<!-- ══ DETAIL MODAL ══ -->
<div class="mo" id="detailMo" onclick="closeMo('detailMo')">
  <div class="mc" onclick="event.stopPropagation()">
    <button class="mc-close" onclick="closeMo('detailMo')">✕</button>
    <div class="mc-title" id="moTitle">تفاصيل المشترك</div>
    <div id="moContent"></div>
    <div id="certSection"></div>
    <button class="print-btn" id="printBtnEl" onclick="printCert()" style="display:none">🖨 طباعة الشهادة / حفظها PDF</button>
  </div>
</div>

<!-- ══ BAN MODAL ══ -->
<div class="mo" id="banMo" onclick="closeMo('banMo')">
  <div class="mc ban-mc" onclick="event.stopPropagation()">
    <button class="mc-close" onclick="closeMo('banMo')">✕</button>
    <div class="ban-icon">🚫</div>
    <div class="mc-title" style="padding:0">تأكيد الحظر</div>
    <p style="color:var(--muted);font-size:.9rem;margin:1rem 0 1.5rem;" id="banTxt"></p>
    <input class="s-input" id="banReason" placeholder="سبب الحظر (اختياري)..." style="margin-bottom:1.2rem;text-align:right;width:100%;"/>
    <div style="display:flex;gap:.75rem;">
      <button onclick="closeMo('banMo')" style="flex:1;padding:.9rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-family:'Tajawal',sans-serif;font-size:.95rem;cursor:pointer;">إلغاء</button>
      <button onclick="confirmBan()" style="flex:1;padding:.9rem;background:linear-gradient(135deg,#b91c1c,#ef4444);border:none;border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;">تأكيد الحظر</button>
    </div>
  </div>
</div>

<script>
// ══ OWNER CREDENTIALS — غيّر هذه البيانات ══
const OWNER_EMAIL = 'drxbe229@gmail.com';   // ← ضع إيميلك هنا
const OWNER_PW    = '0987654321lkjhgfdsa'; // ← ضع كلمة سرك هنا
// ════════════════════════════════════════

const STORAGE_KEY = 'nexiq_results';
let banTargetId = null;

const ELO_TIERS = [
  {min:200,max:400,n:"ما دون المتوسط"},
  {min:400,max:600,n:"مستوى تطويري"},
  {min:600,max:800,n:"مستوى متعلم"},
  {min:800,max:1000,n:"مستوى متوسط"},
  {min:1000,max:1200,n:"فوق المتوسط"},
  {min:1200,max:1500,n:"مستوى متقدم"},
  {min:1500,max:1800,n:"مستوى خبير"},
  {min:1800,max:2200,n:"مستوى ماهر جداً"},
  {min:2200,max:2700,n:"مستوى بارز"},
  {min:2700,max:3201,n:"مستوى أسطوري"}
];
function getTier(e){return ELO_TIERS.find(t=>e>=t.min&&e<t.max)||ELO_TIERS[ELO_TIERS.length-1];}

// ── AUTH ──
function doLogin(){
  const em = document.getElementById('emailInput').value.trim().toLowerCase();
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  if(em === OWNER_EMAIL.toLowerCase() && pw === OWNER_PW){
    sessionStorage.setItem('nx_auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    document.getElementById('adminUserLbl').textContent='مرحباً · '+em;
    renderAll();
  } else {
    err.style.display='block';
    document.getElementById('pwInput').value='';
    setTimeout(()=>err.style.display='none',4000);
  }
}
function logout(){
  sessionStorage.removeItem('nx_auth');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('emailInput').value='';
  document.getElementById('pwInput').value='';
}
// Auto-login if session active
if(sessionStorage.getItem('nx_auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  document.getElementById('adminUserLbl').textContent='مرحباً · '+OWNER_EMAIL;
  setTimeout(renderAll,100);
}

// ── DATA ──
function getR(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){return[];}}
function saveR(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}
function clearAllData(){if(confirm('سيتم حذف جميع البيانات نهائياً. هل أنت متأكد؟')){localStorage.removeItem(STORAGE_KEY);renderAll();}}

function addDemoData(){
  const names=['أحمد الزهراني','سارة المطيري','خالد العتيبي','نورة الشمري','عبدالله القحطاني','ريم الدوسري','محمد الغامدي','هدى السلمي','فيصل الحربي','لينا العمري'];
  const results=getR();
  names.forEach((name,i)=>{
    const elo=500+Math.floor(Math.random()*2200);
    const tier=getTier(elo);
    results.push({
      id:'demo_'+Date.now()+'_'+i,
      name,age:18+Math.floor(Math.random()*30),
      gender:i%3===0?'أنثى':'ذكر',
      type:i%3===0?'مسجل':'ضيف',
      elo,tier:tier.n,
      iq:20+Math.round(Math.random()*75),
      eq:20+Math.round(Math.random()*75),
      str:20+Math.round(Math.random()*75),
      phy:20+Math.round(Math.random()*75),
      men:20+Math.round(Math.random()*75),
      mbti:['INTJ','ENTP','INFP','ESTJ','ENFJ','ISTP','ENTJ','INFJ'][i%8],
      mentalAge:18+Math.floor(Math.random()*25),
      date:new Date(Date.now()-Math.floor(Math.random()*30*86400000)).toISOString(),
      banned:false,banReason:''
    });
  });
  saveR(results);renderAll();
}

// ── STATS ──
function renderStats(){
  const r=getR();
  const total=r.length,active=r.filter(x=>!x.banned).length,banned=r.filter(x=>x.banned).length;
  const avgElo=total?Math.round(r.reduce((s,x)=>s+(x.elo||0),0)/total):0;
  const guests=r.filter(x=>x.type==='ضيف').length;
  const topElo=total?Math.max(...r.map(x=>x.elo||0)):0;
  const today=r.filter(x=>{try{return new Date(x.date).toDateString()===new Date().toDateString();}catch{return false;}}).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="scard"><span class="scard-num">${total}</span><span class="scard-lbl">إجمالي المشتركين</span></div>
    <div class="scard"><span class="scard-num" style="color:var(--green)">${active}</span><span class="scard-lbl">نشط</span></div>
    <div class="scard"><span class="scard-num" style="color:var(--danger)">${banned}</span><span class="scard-lbl">محظور</span></div>
    <div class="scard"><span class="scard-num">${today}</span><span class="scard-lbl">اليوم</span></div>
    <div class="scard"><span class="scard-num">${avgElo||'—'}</span><span class="scard-lbl">متوسط ELO</span></div>
    <div class="scard"><span class="scard-num" style="color:var(--gold)">${topElo||'—'}</span><span class="scard-lbl">أعلى ELO</span></div>
    <div class="scard"><span class="scard-num">${guests}</span><span class="scard-lbl">ضيوف</span></div>
  `;
}

// ── TABLE ──
function renderTable(){
  let r=getR();
  const q=document.getElementById('searchInput').value.toLowerCase();
  const ft=document.getElementById('ftType').value;
  const fs=document.getElementById('ftStatus').value;
  const so=document.getElementById('ftSort').value;
  if(q)r=r.filter(x=>x.name.toLowerCase().includes(q)||String(x.elo).includes(q)||(x.tier||'').includes(q));
  if(ft)r=r.filter(x=>x.type===ft);
  if(fs==='active')r=r.filter(x=>!x.banned);
  if(fs==='banned')r=r.filter(x=>x.banned);
  if(so==='date_desc')r.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(so==='date_asc')r.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(so==='elo_desc')r.sort((a,b)=>(b.elo||0)-(a.elo||0));
  if(so==='elo_asc')r.sort((a,b)=>(a.elo||0)-(b.elo||0));
  document.getElementById('twCount').textContent=r.length+' مشترك';
  if(!r.length){
    document.getElementById('tBody').innerHTML=`<div class="empty-st"><span class="empty-icon">📋</span><div>لا توجد نتائج بعد</div><div style="font-size:.82rem;margin-top:.5rem">تظهر النتائج تلقائياً عند إكمال الاختبار</div></div>`;
    return;
  }
  const rows=r.map(x=>{
    const d=x.date?new Date(x.date).toLocaleDateString('ar-SA'):'—';
    const ti=x.date?new Date(x.date).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}):'';
    const tier=x.tier||getTier(x.elo||200).n;
    return `<tr class="${x.banned?'banned-row':''}">
      <td><div style="font-weight:700">${x.name||'—'}</div>${x.banned?`<div><span class="banned-tag">⛔ ${x.banReason||'محظور'}</span></div>`:''}</td>
      <td>${x.age||'—'}</td>
      <td>${x.gender||'—'}</td>
      <td><span class="type-b">${x.type||'ضيف'}</span></td>
      <td><span class="elo-b">${x.elo||'—'}</span></td>
      <td style="font-size:.8rem;color:var(--muted);max-width:130px">${tier}</td>
      <td style="font-family:'Space Mono',monospace;font-size:.8rem;color:var(--accent)">${x.mbti||'—'}</td>
      <td class="dc">${d}<br><span style="font-size:.68rem">${ti}</span></td>
      <td><div class="ab">
        <button class="bv" onclick="viewUser('${x.id}')">عرض</button>
        <button class="bc" onclick="viewCert('${x.id}')">شهادة</button>
        ${x.banned?`<button class="bu" onclick="unban('${x.id}')">رفع</button>`:`<button class="bb" onclick="startBan('${x.id}')">حظر</button>`}
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('tBody').innerHTML=`<table><thead><tr><th>الاسم</th><th>العمر</th><th>الجنس</th><th>النوع</th><th>ELO</th><th>المستوى</th><th>MBTI</th><th>التاريخ</th><th>إجراءات</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function renderAll(){renderStats();renderTable();}

// ── VIEW ──
function viewUser(id){
  const r=getR().find(x=>x.id===id);if(!r)return;
  const tier=r.tier||getTier(r.elo||200).n;
  document.getElementById('moTitle').textContent='تفاصيل: '+r.name;
  document.getElementById('moContent').innerHTML=`
    <div class="dr"><span class="dk">الاسم</span><span class="dv">${r.name}</span></div>
    <div class="dr"><span class="dk">العمر</span><span class="dv">${r.age} سنة</span></div>
    <div class="dr"><span class="dk">الجنس</span><span class="dv">${r.gender}</span></div>
    <div class="dr"><span class="dk">نوع الحساب</span><span class="dv">${r.type||'ضيف'}</span></div>
    <div class="dr"><span class="dk">درجة ELO</span><span class="dv elo-v">${r.elo}</span></div>
    <div class="dr"><span class="dk">المستوى</span><span class="dv">${tier}</span></div>
    <div class="dr"><span class="dk">🧠 الذكاء العقلي</span><span class="dv">${r.iq}%</span></div>
    <div class="dr"><span class="dk">❤️ الذكاء العاطفي</span><span class="dv">${r.eq}%</span></div>
    <div class="dr"><span class="dk">♟️ الذكاء الاستراتيجي</span><span class="dv">${r.str}%</span></div>
    <div class="dr"><span class="dk">⚡ الذكاء الجسدي</span><span class="dv">${r.phy}%</span></div>
    <div class="dr"><span class="dk">🔮 الذكاء الذهني</span><span class="dv">${r.men}%</span></div>
    <div class="dr"><span class="dk">نمط MBTI</span><span class="dv" style="font-family:'Space Mono',monospace;color:var(--pl)">${r.mbti||'—'}</span></div>
    <div class="dr"><span class="dk">عمر العقل</span><span class="dv">${r.mentalAge||'—'} سنة</span></div>
    <div class="dr"><span class="dk">تاريخ الاختبار</span><span class="dv">${r.date?new Date(r.date).toLocaleString('ar-SA'):'—'}</span></div>
    ${r.banned?`<div class="dr"><span class="dk">الحالة</span><span class="dv" style="color:var(--danger)">⛔ محظور — ${r.banReason||'بدون سبب'}</span></div>`:''}
  `;
  document.getElementById('certSection').innerHTML='';
  document.getElementById('printBtnEl').style.display='none';
  openMo('detailMo');
}

// ── CERTIFICATE ──
function viewCert(id){
  const r=getR().find(x=>x.id===id);if(!r)return;
  const tier=r.tier||getTier(r.elo||200).n;
  const certId='NXQ-'+(r.id||'').replace(/[^a-z0-9]/gi,'').slice(-8).toUpperCase();
  const dateStr=r.date?new Date(r.date).toLocaleDateString('ar-SA'):'—';
  document.getElementById('moTitle').textContent='شهادة: '+r.name;
  document.getElementById('moContent').innerHTML='';
  document.getElementById('certSection').innerHTML=`
    <div class="cert-wrap" id="certPA">
      <span class="cert-corner tl">✦</span><span class="cert-corner tr">✦</span>
      <span class="cert-corner bl">✦</span><span class="cert-corner br">✦</span>
      <div class="cert-badge-txt">NEXIQ · شهادة اختبار الذكاء المتكامل</div>
      <div class="cert-main-title">شهادة تفوق</div>
      <div class="cert-subtitle">تُمنح هذه الشهادة لـ</div>
      <div class="cert-divider"></div>
      <div class="cert-name">${r.name}</div>
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:.75rem">لإتمامه اختبار NEXIQ للذكاء المتكامل بدرجة</div>
      <div class="cert-elo-wrap">
        <span class="cert-elo-num">${r.elo}</span>
        <div class="cert-elo-lbl">نقطة ELO</div>
      </div>
      <div class="cert-tier">${tier}</div>
      <div class="cert-grid">
        <div class="cg-item"><span class="cg-val">🧠 ${r.iq}%</span><div class="cg-lbl">العقلي</div></div>
        <div class="cg-item"><span class="cg-val">❤️ ${r.eq}%</span><div class="cg-lbl">العاطفي</div></div>
        <div class="cg-item"><span class="cg-val">♟️ ${r.str}%</span><div class="cg-lbl">الاستراتيجي</div></div>
        <div class="cg-item"><span class="cg-val">⚡ ${r.phy}%</span><div class="cg-lbl">الجسدي</div></div>
        <div class="cg-item"><span class="cg-val">🔮 ${r.men}%</span><div class="cg-lbl">الذهني</div></div>
        <div class="cg-item"><span class="cg-val" style="font-family:'Space Mono',monospace">${r.mbti||'—'}</span><div class="cg-lbl">MBTI</div></div>
      </div>
      <div class="cert-footer-txt">
        تاريخ الاختبار: ${dateStr} &nbsp;|&nbsp; العمر: ${r.age} سنة &nbsp;|&nbsp; عمر العقل: ${r.mentalAge||'—'} سنة
      </div>
      <div class="cert-id">${certId}</div>
    </div>
  `;
  document.getElementById('printBtnEl').style.display='block';
  openMo('detailMo');
}

function printCert(){
  const cert=document.getElementById('certPA');
  if(!cert)return;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>شهادة NEXIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#07070f;color:#f1f0ff;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;direction:rtl;}
  .cert-wrap{background:linear-gradient(145deg,#08081a,#0d0d20);border:2px solid #7c3aed;border-radius:18px;padding:2.5rem;text-align:center;max-width:680px;width:100%;position:relative;overflow:hidden;}
  .cert-corner{position:absolute;font-size:1.5rem;opacity:.15;}
  .cert-corner.tl{top:1rem;right:1rem;}.cert-corner.tr{top:1rem;left:1rem;}.cert-corner.bl{bottom:1rem;right:1rem;}.cert-corner.br{bottom:1rem;left:1rem;}
  .cert-badge-txt{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.35em;color:#a855f7;text-transform:uppercase;margin-bottom:1rem;opacity:.8;}
  .cert-main-title{font-size:1.6rem;font-weight:900;color:#c084fc;margin-bottom:.3rem;}
  .cert-subtitle{font-size:.85rem;color:#6b6b8a;margin-bottom:1rem;}
  .cert-divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#7c3aed,transparent);margin:.8rem auto;}
  .cert-name{font-size:2.2rem;font-weight:900;color:#f1f0ff;margin:.5rem 0 1.2rem;}
  .cert-elo-wrap{display:inline-block;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);border-radius:16px;padding:.8rem 2rem;margin-bottom:.5rem;}
  .cert-elo-num{font-family:'Space Mono',monospace;font-size:2.8rem;font-weight:700;color:#a855f7;display:block;line-height:1;}
  .cert-elo-lbl{font-size:.8rem;color:#6b6b8a;margin-top:.2rem;}
  .cert-tier{font-size:1.1rem;color:#c084fc;font-weight:700;margin:.5rem 0 1.2rem;}
  .cert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin:1.2rem 0;}
  .cg-item{background:rgba(255,255,255,.03);border-radius:10px;padding:.7rem .5rem;}
  .cg-val{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:#f1f0ff;display:block;}
  .cg-lbl{font-size:.65rem;color:#6b6b8a;margin-top:.15rem;}
  .cert-footer-txt{font-size:.72rem;color:#6b6b8a;margin-top:1rem;font-family:'Space Mono',monospace;line-height:1.8;}
  .cert-id{font-family:'Space Mono',monospace;font-size:.65rem;color:rgba(168,85,247,.3);margin-top:.4rem;}
  @media print{body{background:#07070f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  </style></head><body>`);
  win.document.write(cert.outerHTML);
  win.document.write('</body></html>');
  win.document.close();
  setTimeout(()=>win.print(),900);
}

// ── BAN ──
function startBan(id){
  banTargetId=id;
  const r=getR().find(x=>x.id===id);
  document.getElementById('banTxt').textContent='هل تريد حظر "'+( r?.name||'هذا المشترك')+'"؟';
  document.getElementById('banReason').value='';
  openMo('banMo');
}
function confirmBan(){
  if(!banTargetId)return;
  const reason=document.getElementById('banReason').value.trim();
  const r=getR();const i=r.findIndex(x=>x.id===banTargetId);
  if(i>-1){r[i].banned=true;r[i].banReason=reason||'بدون سبب';saveR(r);}
  closeMo('banMo');banTargetId=null;renderAll();
}
function unban(id){
  const r=getR();const i=r.findIndex(x=>x.id===id);
  if(i>-1){r[i].banned=false;r[i].banReason='';saveR(r);renderAll();}
}

// ── MODAL ──
function openMo(id){document.getElementById(id).classList.add('open');}
function closeMo(id){document.getElementById(id).classList.remove('open');}
</script>
</body>
</html>
